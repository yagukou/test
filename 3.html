<style>
.register-section{
  min-height:100vh;

  background:#f7f7f7;

  padding:120px 20px;
}

.register-box{
  max-width:800px;

  margin:auto;

  background:white;

  padding:50px;

  border-radius:20px;

  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.register-box h1{
  text-align:center;

  margin-bottom:40px;

  color:#b90e0e;

  font-family:serif;
}

.register-box label{
  display:block;

  margin-top:20px;
  margin-bottom:8px;

  font-weight:bold;

  color:#333;
}

.register-box input,
.register-box textarea{
  width:100%;

  padding:15px;

  border:1px solid #ddd;

  border-radius:10px;

  box-sizing:border-box;
}

.register-box textarea{
  min-height:180px;

  resize:vertical;
}

.register-box button{
  width:100%;

  margin-top:30px;

  padding:18px;

  border:none;

  border-radius:12px;

  background:#b90e0e;

  color:white;

  font-size:18px;

  cursor:pointer;
}

.register-box button:hover{
  background:#920909;
}

</style>

<script type="module">

async function registerPerformance(performanceData) {

  try {

    const docRef = await addDoc(
      collection(db, "performances"),
      {
        ...performanceData,
        created_at: serverTimestamp()
      }
    );

    console.log(
      "Document written with ID:",
      docRef.id
    );

  } catch (e) {

    console.error(
      "Error adding document:",
      e
    );

  }

}

<section class="register-section">

  <div class="register-box">

    <h1>公演登録</h1>

    <form id="registerForm">

      <label>公演名</label>
      <input type="text" id="title" required>

      <label>劇団名</label>
      <input type="text" id="group" required>

      <label>公演日</label>
      <input type="date" id="date" required>

      <label>会場</label>
      <input type="text" id="place" required>

      <label>公演画像</label>
      <input type="file" id="image">

      <label>公演概要</label>
      <textarea id="description"></textarea>

      <button type="submit">
        登録する
      </button>

    </form>

  </div>

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsYGkjbE1_6j0b560JhGcxxSH0wdXkP24",
  authDomain: "soukeiengekisai.firebaseapp.com",
  projectId: "soukeiengekisai",
  storageBucket: "soukeiengekisai.firebasestorage.app",
  messagingSenderId: "421329522934",
  appId: "1:421329522934:web:5011ab66c01335f12a5cd7",
  measurementId: "G-THFPJGJJ87"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document
.getElementById("registerForm")
.addEventListener("submit", async function(e){

  e.preventDefault();

  const performanceData = {

    title: document.getElementById("title").value,
    group: document.getElementById("group").value,
    date: document.getElementById("date").value,
    place: document.getElementById("place").value,
    description: document.getElementById("description").value,

    created_at: serverTimestamp()

  };

  try {

    alert("公演登録完了");

    this.reset();

  } catch(error) {

    console.error(error);

    alert("登録失敗");

  }

});

</script>

</section>

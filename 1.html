<div class="company-grid" id="companyGrid"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

  apiKey:"AIza...",
  authDomain:"soukeiengekisai.firebaseapp.com",
  projectId:"soukeiengekisai",
  storageBucket:"soukeiengekisai.firebasestorage.app",
  messagingSenderId:"421329522934",
  appId:"1:421329522934:web:5011ab66c01335f12a5cd7"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadTheatres(){

  const grid =
    document.getElementById("companyGrid");

  const snapshot =
    await getDocs(collection(db,"theatres"));

  grid.innerHTML = "";

  snapshot.forEach(doc=>{

    const data = doc.data();

    grid.innerHTML += `
      <div class="company-card">

        <h3>${data.name}</h3>

        <p>${data.university}</p>

        <p>
          次回公演：
          ${data.nextShow}
        </p>

      </div>
    `;

  });

}

loadTheatres();

</script>

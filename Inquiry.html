     <style>

.goog-te-banner-frame,

  }

/* ホバー効果 */
.menu-1:hover {
  transform: translateY(-3px);
  transition: 0.3s;
}

.menu-1 img {
  width: 30px !important;
  height: 30px !important;
}

.slider {
  position: relative;
  width: 80%;
  margin: 30px auto;
  overflow: hidden;
}

.slides {
  position: relative;
}

.slide {
  width: 100%;
  display: none;
  border-radius: 10px;
  opacity: 0;
  transition: 0.5s;
  position: absolute;
}

.slide.active {
  display: block;
  opacity: 1;
  position: relative;
}

button.prev, button.next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

.lang-wrapper {
  position: relative;
  display: inline-block;
}

/* ↓ 下にポップアップさせる */
.lang-menu {
  position: absolute;
  top: 110%;   /* ←ボタンの真下 */
  left: 0;
  width: 140px;

  background: #f0f0f0;
  border-radius: 12px;
  display: none;
  overflow: hidden;
  z-index: 9999;
}

/* 中身 */
.lang-menu div {
  padding: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  color: black
}

/* ホバー */
.lang-menu div:hover {
  background: #ddd;
}

.lang-wrapper .lang-menu {
  display: none;
}

.menu-1 span {
  display: block;
  width: 100%;
  text-align: center;       /* 真ん中に */
  margin-top: 5px;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 11px;
}

.goog-te-banner-frame.skiptranslate {
  display: none !important;
}

.goog-te-banner-frame {
  display: none !important;
}

body {
  top: 0px !important;
  position: static !important;
}

body.translated-ltr .logo-main {
  font-size: 22px;
}

body.translated-ltr .logo-sub {
  font-size: 14px;
}

.hamburger {
  display: none;
}

@media (max-width: 768px) {

  header {
    position: relative;
    height: 70px;
  }

  /* ロゴ中央 */
  .logo {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    margin: 0;
  }

  /* 左メニュー消す */
  .menu-left {
    display: none;
  }

  /* 右メニューも消す */
  .menu-right {
    display: none;
  }

  /* ハンバーガー（右上） */
  .hamburger {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
    cursor: pointer;
    z-index: 1000;
    display: block;
  }
}

  </style>
 </head>

 <script>
function toggleLangMenu(e) {
  if (e) e.stopPropagation();

  const menu = document.getElementById("lang-menu");

  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

/* 外クリックで閉じる */
document.addEventListener("click", function() {
  const menu = document.getElementById("lang-menu");
  if (menu) menu.style.display = "none";
});

/* ←これが無かったから翻訳されてない */
function setLang(lang) {
  document.cookie = "googtrans=/ja/" + lang + "; path=/";
  location.reload();
}
</script>

  }, 'google_translate_element');
}
</script>

<script>
function removeGoogleUI() {
  // バナー
  document.querySelectorAll('.goog-te-banner-frame').forEach(el => el.remove());

  // ポップアップ（翻訳されました表示）
  document.querySelectorAll('.goog-te-balloon-frame').forEach(el => el.remove());

  // その他UI
  document.querySelectorAll('.skiptranslate').forEach(el => {
    if (el.innerText.includes("翻訳")) el.remove();
  });

  // 位置ズレ修正
  document.body.style.top = '0px';
}

/* ずっと監視して消す */
setInterval(removeGoogleUI, 300);
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ</title>

  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
      margin: 0;
      padding: 20px;
    }

    .form-container {
      max-width: 500px;
      margin: 50px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    textarea {
      resize: vertical;
      height: 100px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      background: #ff7e5f;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    button:hover {
      background: #eb6750;
    }
  </style>
</head>

<body>

<div class="form-container">
  <h2>お問い合わせ</h2>

  <form action="https://formspree.io/mgodpzjw" method="POST">
    <label>お名前</label>
    <input type="text" name="name" required>

    <label>メールアドレス</label>
    <input type="email" name="email" required>

    <label>お問い合わせ内容</label>
    <textarea name="message" required></textarea>

    <button type="submit">送信</button>
  </form>
</div>

</body>

```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>公演スケジュール</title>

<style>

body{
  margin:0;
  background:#111;
  font-family:sans-serif;
}

/* =======================
   HEADER
======================= */

header{
  position:fixed;
  top:0;
  left:0;

  width:100%;

  background:#b90e0e;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:15px 40px;

  z-index:999;
}

.logo{
  color:white;
  font-size:28px;
  font-family:serif;
  letter-spacing:3px;
}

.header-menu{
  display:flex;
  gap:30px;
}

.header-menu a{
  color:white;
  text-decoration:none;
  font-size:15px;
}

/* =======================
   HERO
======================= */

.hero{
  height:60vh;

  background:
  linear-gradient(
    rgba(0,0,0,0.45),
    rgba(0,0,0,0.6)
  ),
  url("hero.jpg");

  background-size:cover;
  background-position:center;

  display:flex;
  align-items:end;

  padding:120px 8%;
}

.hero-text p{
  color:#d4af37;
  letter-spacing:4px;
}

.hero-text h1{
  color:white;
  font-size:72px;
  margin-top:20px;
  font-family:serif;
}

/* =======================
   CALENDAR
======================= */

.calendar-section{
  background:#f7f7f7;

  padding:120px 8%;
}

.section-en{
  color:#b90e0e;
  letter-spacing:4px;
}

.section-title{
  font-size:60px;
  margin-top:10px;
  margin-bottom:60px;

  color:black;

  font-family:serif;
}

/* top */

.calendar-top{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:50px;
}

.month-change{
  display:flex;
  align-items:center;
  gap:20px;
}

.month-change button{
  width:50px;
  height:50px;

  border:none;

  background:#b90e0e;
  color:white;

  border-radius:50%;

  font-size:18px;

  cursor:pointer;
}

.month-change h2{
  color:black;
  font-size:40px;
  font-family:serif;
}

/* grid */

.calendar-grid{
  display:grid;

  grid-template-columns:repeat(7,1fr);

  gap:2px;

  background:#ddd;
}

.day-name{
  background:#222;

  color:white;

  padding:20px;

  text-align:center;
}

.day{
  min-height:170px;

  background:white;

  padding:15px;

  position:relative;
}

.date{
  color:#777;
  margin-bottom:15px;
}

.event{
  display:block;

  background:#111;
  color:white;

  text-decoration:none;

  padding:10px;

  border-radius:10px;

  margin-bottom:10px;

  transition:0.3s;
}

.event:hover{
  background:#b90e0e;
  transform:translateY(-3px);
}

/* =======================
   PERFORMANCE LIST
======================= */

.performance-list{
  margin-top:100px;
}

.performance-grid{
  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(320px,1fr));

  gap:40px;
}

.performance-card{
  background:white;

  border-radius:20px;

  overflow:hidden;

  text-decoration:none;

  transition:0.4s;

  box-shadow:
  0 10px 30px rgba(0,0,0,0.08);
}

.performance-card:hover{
  transform:translateY(-10px);
}

.performance-card img{
  width:100%;
  height:380px;

  object-fit:cover;

  transition:0.6s;
}

.performance-card:hover img{
  transform:scale(1.05);
}

.performance-info{
  padding:30px;
}

.performance-date{
  color:#888;
  margin-bottom:15px;
}

.performance-title{
  color:black;
  font-size:32px;
  font-family:serif;

  margin-bottom:20px;
}

.performance-place{
  color:#666;
  margin-bottom:30px;
}

.detail-btn{
  color:#b90e0e;
  font-weight:bold;
}

/* =======================
   LOGIN BUTTON
======================= */

.login-btn{
  position:fixed;

  right:30px;
  bottom:30px;

  background:#b90e0e;
  color:white;

  text-decoration:none;

  padding:18px 28px;

  border-radius:999px;

  z-index:999;
}

.calendar-section{
  background:#f7f7f7;
  padding:60px 8%;
}

.calendar-head{
  margin-bottom:50px;
}

.calendar-en{
  color:#b90e0e;
  letter-spacing:4px;
  margin-bottom:10px;
}

.calendar-head h2{
  font-size:58px;
  color:black;
  margin:0;
  font-family:serif;
}

.calendar-top{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:30px;

  margin-bottom:40px;
}

.calendar-top button{
  width:55px;
  height:55px;

  border:none;
  border-radius:50%;

  background:#b90e0e;
  color:white;

  font-size:28px;
  cursor:pointer;

  transition:0.3s;
}

.calendar-top button:hover{
  transform:scale(1.08);
}

.month-title{
  font-size:34px;
  color:black;
  font-family:serif;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);

  background:white;

  border-radius:24px;
  overflow:hidden;

  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.day-name{
  background:#111;
  color:white;

  padding:20px;
  text-align:center;

  font-size:14px;
  letter-spacing:2px;
}

.day{
  min-height:150px;

  border:1px solid #eee;

  padding:12px;

  position:relative;

  background:white;

  transition:0.3s;
}

.day:hover{
  background:#fafafa;
}

.day-number{
  font-size:18px;
  color:#777;

  margin-bottom:12px;
}

.event{
  background:#b90e0e;
  color:white;

  padding:8px 10px;

  border-radius:10px;

  margin-bottom:8px;

  font-size:13px;

  cursor:pointer;

  transition:0.3s;
}

.event:hover{
  transform:translateY(-2px);
  background:#920909;
}

.empty{
  background:#f8f8f8;
}

@media(max-width:768px){

  .calendar-head h2{
    font-size:42px;
  }

  .calendar-grid{
    grid-template-columns:repeat(1,1fr);
  }

  .day-name{
    display:none;
  }

  .day{
    min-height:auto;
  }

}
/* =======================
   SP
======================= */

@media(max-width:768px){

.hero-text h1{
  font-size:48px;
}

.calendar-grid{
  grid-template-columns:repeat(2,1fr);
}

.day{
  min-height:140px;
}

.header-menu{
  display:none;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

  <div class="logo">
    早慶演劇祭
  </div>

  <div class="header-menu">
    <a href="#">公演一覧</a>
    <a href="#">カレンダー</a>
    <a href="#">ニュース</a>
    <a href="#">ログイン</a>
  </div>

</header>

<!-- HERO -->

<section class="hero">

  <div class="hero-text">

    <p>Waseda–Keio Theatre Festival</p>

    <h1>
      公演スケジュール
    </h1>

  </div>

</section>

<!-- CALENDAR -->

<section class="calendar-section">

  <div class="calendar-top">

    <button id="prevMonth">‹</button>

    <div class="month-title" id="monthTitle">
      2026年8月
    </div>

    <button id="nextMonth">›</button>

  </div>

  <div class="calendar-grid" id="calendar"></div>

</section>

<a href="#" class="login-btn">
  ログイン
</a>

<script>

const calendar = document.getElementById("calendar");

const monthTitle = document.getElementById("monthTitle");

let currentMonth = 7;
let currentYear = 2026;

const events = {
  "2026-8-10": ["開幕公演『光と影』"],
  "2026-8-12": ["慶應義塾大学公演"],
  "2026-8-15": ["早稲田演劇研究会"],
  "2026-8-18": ["特別シンポジウム"],
  "2026-8-22": ["学生交流イベント"]
};

function renderCalendar(year, month){

  calendar.innerHTML = "";

  const dayNames = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

  dayNames.forEach(day=>{
    calendar.innerHTML += `
      <div class="day-name">${day}</div>
    `;
  });

  const firstDay = new Date(year, month, 1).getDay();

  const lastDate = new Date(year, month + 1, 0).getDate();

  monthTitle.innerHTML = `${year}年${month + 1}月`;

  for(let i=0; i<firstDay; i++){
    calendar.innerHTML += `<div class="day empty"></div>`;
  }

  for(let d=1; d<=lastDate; d++){

    const key = `${year}-${month+1}-${d}`;

    let eventHTML = "";

    if(events[key]){

      events[key].forEach(ev=>{

        eventHTML += `
          <div class="event">
            ${ev}
          </div>
        `;

      });

    }

    calendar.innerHTML += `
      <div class="day">
        <div class="day-number">${d}</div>
        ${eventHTML}
      </div>
    `;
  }
}

renderCalendar(currentYear,currentMonth);

document.getElementById("prevMonth").onclick = ()=>{

  currentMonth--;

  if(currentMonth < 0){
    currentMonth = 11;
    currentYear--;
  }

  renderCalendar(currentYear,currentMonth);
};

document.getElementById("nextMonth").onclick = ()=>{

  currentMonth++;

  if(currentMonth > 11){
    currentMonth = 0;
    currentYear++;
  }

  renderCalendar(currentYear,currentMonth);
};

</script>

</body>
</html>

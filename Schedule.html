<script>

const calendar = document.getElementById("calendar");

const monthTitle = document.getElementById("monthTitle");

let currentMonth = 7;
let currentYear = 2026;

function renderCalendar(year, month){

  calendar.innerHTML = "";

  const dayNames = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

  dayNames.forEach(day=>{
    calendar.innerHTML += `
      <div class="day-name">${day}</div>
    `;
  });

  const firstDay = new Date(year, month, 1).getDay();

  const lastDate = new Date(year, month + 1, 0).getDate();

  monthTitle.innerHTML = `${year}年${month + 1}月`;

  for(let i=0; i<firstDay; i++){
    calendar.innerHTML += `<div class="day empty"></div>`;
  }

  for(let d=1; d<=lastDate; d++){

    const key =
`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    let eventHTML = "";

    if(events[key]){

  events[key].forEach(ev=>{

    eventHTML += `
      <div class="event"
           onclick="showPerformance('${ev}')">

        ${ev}

      </div>
    `;

  });

}

    calendar.innerHTML += `
      <div class="day">
        <div class="day-number">${d}</div>
        ${eventHTML}
      </div>
    `;
  }
}

renderCalendar(currentYear,currentMonth);

function showPerformance(title){

 document.getElementById("modalTitle").innerText = title;

 document.getElementById("performanceModal").style.display = "block";
}

document.querySelector(".close").onclick = ()=>{

 document.getElementById("performanceModal").style.display = "none";
}

document.getElementById("prevMonth").onclick = ()=>{

  currentMonth--;

  if(currentMonth < 0){
    currentMonth = 11;
    currentYear--;
  }

  renderCalendar(currentYear,currentMonth);
};

document.getElementById("nextMonth").onclick = ()=>{

  currentMonth++;

  if(currentMonth > 11){
    currentMonth = 0;
    currentYear++;
  }

  renderCalendar(currentYear,currentMonth);
};

</script>

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const events = {};

async function loadPerformances(){

  const snapshot =
    await getDocs(collection(db,"performances"));

  snapshot.forEach(doc=>{

    const data = doc.data();

    const date = data.date;

    if(!events[date]){
      events[date] = [];
    }

    events[date].push(data.title);

  });

  renderCalendar(currentYear,currentMonth);

}

loadPerformances();

</script>

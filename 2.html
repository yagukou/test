<style>
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
}

.stat-card{
  background:white;
  padding:30px;
  border-radius:20px;
  border:1px solid #eee;
}

.request-card{
  background:white;
  border-radius:20px;
  padding:30px;
  margin-bottom:20px;
  border-left:5px solid #b90e0e;
}

.accept-btn{
  background:#dff5ef;
  color:#008060;
}

.reject-btn{
  background:#ffe0e0;
  color:#c00;
}

</style>

<div class="dashboard">

  <div class="stat-card">
    <p>未読の折り込み依頼</p>
    <h2>2件</h2>
  </div>

  <div class="stat-card">
    <p>登録中の公演</p>
    <h2>2件</h2>
  </div>

  <div class="stat-card">
    <p>送信した依頼</p>
    <h2>3件</h2>
  </div>

  <div class="stat-card">
    <p>承諾済み折り込み</p>
    <h2>2件</h2>
  </div>

</div>

<h2>受信した折り込み依頼</h2>

<div class="request-card">

  <h3>
    劇団ソウル「春の嵐、それから」
  </h3>

  <p>
    光と影の間で への折り込み依頼
  </p>

  <p>
    100部 / 郵送
  </p>

  <button class="accept-btn">
    承諾
  </button>

  <button class="reject-btn">

  </button>

</div>

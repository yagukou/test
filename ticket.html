<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

     <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;  
      color: white; 
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #b90e0e;
      padding: 10px 20px;
    }

    .menu-left, .menu-right {
      display: flex;
      gap: 10px;
      justify-content: space-around;
      align-items: center;
      z-index: 2;
    }

    .menu-left div, .menu-right div {
      display: flex;
      flex-direction: column;  /* ←縦にする */
      align-items: center;
      text-align: center;
}

    .menu-left img, .menu-right img {
       width: 30px;
       height: 30px;
       margin-bottom: 5px;
}

    .logo {
      font-size: 24px;
      font-weight: bold;
      font-family: "Times New Roman", serif;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
      color: #222;
      text-align: center;
      line-height: 1.2;
      display: flex;
      flex-direction: column;  
      align-items: center;
      position: absolute;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1;

  max-width: 40%;  /* ←これ超重要 */
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
    }

    .logo-main {
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 3px;
}

.logo-sub {   
  font-size: 16px;   
  letter-spacing: 2px;
  color: #d4af37;      
}

    a {
      text-decoration: none;
      flex-direction: column;
      color: black;
      font-size: 12px;
    }

        .menu-1 {
  display: flex;
  flex-direction: column;
  align-items: center;

  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  width: 80px;   /* 横幅固定 */
  height: 80px;  /* 高さ固定 */
  justify-content: center;
}

.menu-1, .language-btn {
  background: #b90e0e;; /* 好きな色 */
  color: rgb(8, 8, 8);
}

.goog-te-banner-frame,
  .goog-te-banner-frame.skiptranslate,
  .goog-te-gadget-icon,
  .goog-te-gadget-simple,
  .goog-te-balloon-frame,
  .skiptranslate {
    display: none !important;
  }

  body {
    top: 0px !important;
    position: static !important;
  }

/* ホバー効果 */
.menu-1:hover {
  transform: translateY(-3px);
  transition: 0.3s;
}

.menu-1 img {
  width: 30px !important;
  height: 30px !important;
}

.slider {
  position: relative;
  width: 80%;
  margin: 30px auto;
  overflow: hidden;
}

.slides {
  position: relative;
}

.slide {
  width: 100%;
  display: none;
  border-radius: 10px;
  opacity: 0;
  transition: 0.5s;
  position: absolute;
}

.slide.active {
  display: block;
  opacity: 1;
  position: relative;
}

button.prev, button.next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: white;
  border: none;
  padding: 10px;
  cursor: pointer;
}

.prev { left: 10px; }
.next { right: 10px; }

.lang-wrapper {
  position: relative;
  display: inline-block;
}

/* ↓ 下にポップアップさせる */
.lang-menu {
  position: absolute;
  top: 110%;   /* ←ボタンの真下 */
  left: 0;
  width: 140px;

  background: #f0f0f0;
  border-radius: 12px;
  display: none;
  overflow: hidden;
  z-index: 9999;
}

/* 中身 */
.lang-menu div {
  padding: 10px;
  text-align: center;
  cursor: pointer;
  font-size: 13px;
  color: black
}

/* ホバー */
.lang-menu div:hover {
  background: #ddd;
}

.lang-wrapper .lang-menu {
  display: none;
}

.menu-1 span {
  display: block;
  width: 100%;
  text-align: center;       /* 真ん中に */
  margin-top: 5px;

  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 11px;
}

.goog-te-banner-frame.skiptranslate {
  display: none !important;
}

.goog-te-banner-frame {
  display: none !important;
}

body {
  top: 0px !important;
  position: static !important;
}

body.translated-ltr .logo-main {
  font-size: 22px;
}

body.translated-ltr .logo-sub {
  font-size: 14px;
}

.hamburger {
  display: none;
}

.ticket-hero {
  background-image: url("your-image.png"); /* ←背景画像 */
  background-size: cover;
  background-position: center;

  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 白いフィルター */
.ticket-hero .overlay {
  background: rgba(255, 255, 255, 0.85); /* ←透明な白 */
  width: 100%;
  height: 100%;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* タイトル */
.ticket-hero h1 {
  font-size: 40px;
  letter-spacing: 8px;
  color: rgb(255, 255, 255);
  margin-bottom: 30px;
}

/* 説明文 */
.ticket-hero p {
  text-align: center;
  color: #ffffff;
  line-height: 2;
  font-size: 16px;
}

.ticket-page {
  background: #0d0d0d;
  padding: 120px 8%;
  min-height: 100vh;
}

.ticket-title {
  text-align: center;
  font-size: 70px;
  letter-spacing: 8px;
  color: white;
  margin-bottom: 10px;

  font-family: "Times New Roman", serif;
}

.ticket-sub {
  text-align: center;
  color: #d4af37;
  letter-spacing: 3px;
  margin-bottom: 70px;
}

.ticket-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 40px;
}

.ticket-card {
  background: #151515;

  border-radius: 20px;

  overflow: hidden;

  transition: 0.4s;

  position: relative;

  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.ticket-card:hover {
  transform: translateY(-10px);
}

.ticket-image {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

.ticket-content {
  padding: 30px;
}

.ticket-category {
  color: #d4af37;
  font-size: 14px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.ticket-card h2 {
  font-size: 28px;
  margin-bottom: 20px;
  color: white;

  font-family: serif;
}

.ticket-date {
  color: #ccc;
  margin-bottom: 30px;
}

.ticket-btn {
  display: inline-block;

  padding: 14px 28px;

  border: 1px solid #d4af37;

  color: #d4af37;

  text-decoration: none;

  transition: 0.3s;
}

.ticket-btn:hover {
  background: #d4af37;
  color: black;
}

.ticket-status {
  position: absolute;

  top: 20px;
  left: 20px;

  background: #b90e0e;

  padding: 8px 16px;

  font-size: 12px;
  letter-spacing: 1px;

  z-index: 2;
}

.ticket-status.sold {
  background: #666;
}

@media (max-width: 768px) {

  .ticket-title {
    font-size: 42px;
  }

  .ticket-image {
    height: 300px;
  }

}

@media (max-width: 768px) {

  header {
    position: relative;
    height: 70px;
  }

  /* ロゴ中央 */
  .logo {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    margin: 0;
  }

  /* 左メニュー消す */
  .menu-left {
    display: none;
  }

  /* 右メニューも消す */
  .menu-right {
    display: none;
  }

  /* ハンバーガー（右上） */
  .hamburger {
    position: absolute;
    top: 15px;
    right: 20px;
    font-size: 30px;
    color: white;
    cursor: pointer;
    z-index: 1000;
    display: block;
  }
}

  </style>
 </head>

 <script>
function toggleLangMenu(e) {
  if (e) e.stopPropagation();

  const menu = document.getElementById("lang-menu");

  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

/* 外クリックで閉じる */
document.addEventListener("click", function() {
  const menu = document.getElementById("lang-menu");
  if (menu) menu.style.display = "none";
});

/* ←これが無かったから翻訳されてない */
function setLang(lang) {
  document.cookie = "googtrans=/ja/" + lang + "; path=/";
  location.reload();
}
</script>

<script>
function removeGoogleUI() {
  // バナー
  document.querySelectorAll('.goog-te-banner-frame').forEach(el => el.remove());

  // ポップアップ（翻訳されました表示）
  document.querySelectorAll('.goog-te-balloon-frame').forEach(el => el.remove());

  // その他UI
  document.querySelectorAll('.skiptranslate').forEach(el => {
    if (el.innerText.includes("翻訳")) el.remove();
  });

  // 位置ズレ修正
  document.body.style.top = '0px';
}

/* ずっと監視して消す */
setInterval(removeGoogleUI, 300);
</script>
